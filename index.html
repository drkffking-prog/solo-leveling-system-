<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solo Leveling System</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#020617;
color:white;
font-family:'Rajdhani',sans-serif;
overflow-x:hidden;
}

.container{
max-width:480px;
margin:auto;
min-height:100vh;
padding-bottom:50px;
}

/* BACKGROUND */

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at top right,#00d4ff22,transparent 40%),
radial-gradient(circle at bottom left,#ff660022,transparent 40%);
z-index:-1;
}

/* SETUP */

.setup{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.title{
font-family:'Orbitron',sans-serif;
font-size:32px;
font-weight:900;
color:#00d4ff;
margin-bottom:10px;
text-align:center;
}

.subtitle{
letter-spacing:3px;
font-size:12px;
margin-bottom:30px;
color:#ff6600;
}

.card{
width:100%;
background:#0f172a;
border:1px solid #1e293b;
padding:25px;
border-radius:20px;
box-shadow:0 0 20px #00d4ff22;
}

.input{
width:100%;
padding:15px;
margin-top:15px;
background:#020617;
border:1px solid #334155;
border-radius:12px;
color:white;
font-size:18px;
outline:none;
}

.btn{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:12px;
background:#00d4ff;
color:black;
font-weight:700;
font-size:16px;
cursor:pointer;
}

.btn:hover{
opacity:0.9;
}

/* MAIN */

.main{
display:none;
}

.header{
padding:20px;
background:#0f172a;
border-bottom:1px solid #1e293b;
}

.hunter{
font-family:'Orbitron',sans-serif;
font-size:24px;
font-weight:900;
}

.rank{
display:inline-block;
padding:6px 14px;
border-radius:8px;
background:#ff6600;
margin-top:10px;
font-weight:700;
}

.day{
margin-top:10px;
color:#94a3b8;
}

.progress{
width:100%;
height:10px;
background:#1e293b;
border-radius:20px;
overflow:hidden;
margin-top:15px;
}

.progress-bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#00d4ff,#ff6600);
}

/* STATS */

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:15px;
}

.stat{
background:#0f172a;
padding:15px;
border-radius:15px;
border:1px solid #1e293b;
}

.stat-title{
font-size:12px;
color:#94a3b8;
}

.stat-value{
font-size:28px;
font-weight:700;
margin-top:5px;
}

/* QUESTS */

.section-title{
padding:0 15px;
margin-top:10px;
font-family:'Orbitron',sans-serif;
font-size:18px;
}

.quest-list{
padding:15px;
}

.quest{
background:#0f172a;
padding:15px;
border-radius:15px;
margin-bottom:12px;
border:1px solid #1e293b;
}

.quest-name{
font-size:18px;
font-weight:700;
}

.quest-progress{
margin-top:10px;
font-size:15px;
color:#94a3b8;
}

.quest-bar{
height:8px;
background:#1e293b;
border-radius:20px;
overflow:hidden;
margin-top:8px;
}

.quest-fill{
height:100%;
width:0%;
background:#00d4ff;
}

.quest-btn{
margin-top:12px;
padding:10px 15px;
border:none;
border-radius:10px;
background:#ff6600;
color:white;
font-weight:700;
cursor:pointer;
}

.complete-btn{
margin:20px 15px;
width:calc(100% - 30px);
padding:18px;
border:none;
border-radius:15px;
background:#22c55e;
font-size:18px;
font-weight:700;
color:black;
cursor:pointer;
display:none;
}

/* VIDEO */

.video-box{
padding:15px;
}

.video-title{
font-family:'Orbitron',sans-serif;
margin-bottom:10px;
}

iframe{
border-radius:15px;
}

/* POPUP */

.popup{
position:fixed;
inset:0;
background:#000000dd;
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:999;
}

.popup-card{
background:#0f172a;
padding:30px;
border-radius:20px;
text-align:center;
max-width:350px;
border:1px solid #334155;
}

.popup-title{
font-size:28px;
font-family:'Orbitron',sans-serif;
color:#00ff88;
margin-bottom:10px;
}

.popup-btn{
margin-top:20px;
padding:12px 20px;
border:none;
border-radius:10px;
background:#00d4ff;
font-weight:700;
cursor:pointer;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<!-- SETUP -->

<div class="setup" id="setup">

<div class="title">
SOLO LEVELING
</div>

<div class="subtitle">
60 DAY SYSTEM
</div>

<div class="card">

<h2>Enter Your Name</h2>

<input type="text" id="nameInput" class="input" placeholder="Hunter Name">

<button class="btn" onclick="startSystem()">
AWAKEN
</button>

</div>

</div>

<!-- MAIN -->

<div class="main" id="main">

<div class="header">

<div class="hunter" id="hunterName">
HUNTER
</div>

<div class="rank" id="rankText">
E-RANK
</div>

<div class="day" id="dayText">
DAY 1 / 60
</div>

<div class="progress">
<div class="progress-bar" id="mainProgress"></div>
</div>

</div>

<!-- STATS -->

<div class="stats">

<div class="stat">
<div class="stat-title">PROTEIN</div>
<div class="stat-value">140g</div>
</div>

<div class="stat">
<div class="stat-title">WATER</div>
<div class="stat-value">3L</div>
</div>

<div class="stat">
<div class="stat-title">WORKOUT</div>
<div class="stat-value">100%</div>
</div>

<div class="stat">
<div class="stat-title">LEVEL</div>
<div class="stat-value" id="levelText">1</div>
</div>

</div>

<!-- QUESTS -->

<div class="section-title">
DAILY QUESTS
</div>

<div class="quest-list" id="questList"></div>

<button class="complete-btn" id="completeBtn" onclick="completeDay()">
COMPLETE DAY
</button>

<!-- VIDEO -->

<div class="video-box">

<div class="video-title">
DAILY MOTIVATION
</div>

<iframe 
width="100%" 
height="220"
src="https://www.youtube.com/embed/RoypGYAxD0c"
frameborder="0"
allowfullscreen>
</iframe>

</div>

</div>

</div>

<!-- POPUP -->

<div class="popup" id="popup">

<div class="popup-card">

<div class="popup-title">
QUEST CLEARED
</div>

<p>
You completed today's mission.
</p>

<button class="popup-btn" onclick="closePopup()">
CONTINUE
</button>

</div>

</div>

<script>

let state = {
day:1,
level:1,
quests:{
pushups:0,
situps:0,
squats:0,
running:0
}
}

const targets = {
pushups:100,
situps:100,
squats:100,
running:10
}

function startSystem(){

const name = document.getElementById("nameInput").value || "HUNTER"

localStorage.setItem("hunterName",name)

document.getElementById("hunterName").innerText = name.toUpperCase()

document.getElementById("setup").style.display="none"

document.getElementById("main").style.display="block"

loadData()

renderQuests()

updateUI()

}

function renderQuests(){

const list = document.getElementById("questList")

list.innerHTML=""

for(let key in targets){

let value = state.quests[key]
let target = targets[key]

let percent = Math.min((value/target)*100,100)

list.innerHTML += `

<div class="quest">

<div class="quest-name">
${key.toUpperCase()}
</div>

<div class="quest-progress">
${value} / ${target}
</div>

<div class="quest-bar">
<div class="quest-fill" style="width:${percent}%"></div>
</div>

<button class="quest-btn" onclick="addProgress('${key}')">
+10
</button>

</div>

`

}

checkComplete()

}

function addProgress(type){

state.quests[type]+=10

if(state.quests[type] > targets[type]){
state.quests[type]=targets[type]
}

saveData()

renderQuests()

}

function checkComplete(){

let done = true

for(let key in targets){

if(state.quests[key] < targets[key]){
done=false
}

}

if(done){
document.getElementById("completeBtn").style.display="block"
}else{
document.getElementById("completeBtn").style.display="none"
}

}

function completeDay(){

document.getElementById("popup").style.display="flex"

state.day++
state.level++

state.quests={
pushups:0,
situps:0,
squats:0,
running:0
}

saveData()

updateUI()

renderQuests()

}

function closePopup(){
document.getElementById("popup").style.display="none"
}

function updateUI(){

document.getElementById("dayText").innerText =
"DAY " + state.day + " / 60"

document.getElementById("levelText").innerText =
state.level

let percent = ((state.day-1)/60)*100

document.getElementById("mainProgress").style.width =
percent + "%"

if(state.day >= 50){
document.getElementById("rankText").innerText="S-RANK"
}
else if(state.day >= 40){
document.getElementById("rankText").innerText="A-RANK"
}
else if(state.day >= 30){
document.getElementById("rankText").innerText="B-RANK"
}
else if(state.day >= 20){
document.getElementById("rankText").innerText="C-RANK"
}
else if(state.day >= 10){
document.getElementById("rankText").innerText="D-RANK"
}
else{
document.getElementById("rankText").innerText="E-RANK"
}

}

function saveData(){

localStorage.setItem(
"soloLevelingData",
JSON.stringify(state)
)

}

function loadData(){

const data = localStorage.getItem("soloLevelingData")

if(data){
state = JSON.parse(data)
}

}

window.onload = () => {

const savedName = localStorage.getItem("hunterName")

if(savedName){

document.getElementById("setup").style.display="none"

document.getElementById("main").style.display="block"

document.getElementById("hunterName").innerText =
savedName.toUpperCase()

loadData()

renderQuests()

updateUI()

}

}

</script>

</body>
</html>
